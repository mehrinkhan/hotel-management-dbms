!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Service Config | Urban Nest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo-container"><img src="./images/logo.png" alt="Urban Nest" class="main-logo-lg"></div>
        <nav>
            <ul id="nav-menu">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="rooms.html">Suites</a></li>
                <li class="admin-only"><a href="customers.html">Database</a></li>
                <li class="active admin-only"><a href="services.html">Services</a></li>
                <li><a href="payments.html">Payments</a></li>
            </ul>
        </nav>
    </header>

    <main class="mgmt-section">
        <div class="container" style="max-width: 800px; margin: 0 auto; padding: 40px 20px;">
            <h2 style="text-align:center; letter-spacing: 3px; color: #bbb; text-transform: uppercase; margin-bottom: 30px;">Service Configuration</h2>

            <div class="mgmt-card" style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px;">
                <h3 style="margin-bottom: 15px;">Add New Amenity</h3>
                <div style="display: flex; gap: 15px;">
                    <input type="text" id="svcName" placeholder="Service Name (e.g., Spa)" style="flex: 2; padding: 12px; border: 1px solid #eee; border-radius: 4px;">
                    <input type="number" id="svcPrice" placeholder="Price (৳)" style="flex: 1; padding: 12px; border: 1px solid #eee; border-radius: 4px;">
                </div>
                <button onclick="addService()" class="btn-staff-sm" style="margin-top: 20px; width: 100%; height: 45px;">Add to Menu</button>
            </div>

            <div class="mgmt-card" style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                <h3 style="margin-bottom: 20px; border-bottom: 1px solid #f4f4f4; padding-bottom: 10px;">Current Service Menu</h3>
                <div id="serviceList">
                    </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
